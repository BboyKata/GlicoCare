name: Build GlicoCare

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet==0.27.1 Pillow matplotlib pyinstaller

    - name: Build with Flet Pack (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        flet pack main.py --name "GlicoCare" --icon "img/glicocare.png" --add-data "database/schema.sql:database" --add-data "database/popola_test.sql:database" --add-data "img:img"

    - name: Build with Flet Pack (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        flet pack main.py --name "GlicoCare" --icon "img/glicocare.png" --add-data "database/schema.sql;database" --add-data "database/popola_test.sql;database" --add-data "img;img"

    - name: Upload artifact (Linux)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: GlicoCare-Linux
        path: dist/GlicoCare

    - name: Upload artifact (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: GlicoCare-Windows
        path: dist/GlicoCare.exe