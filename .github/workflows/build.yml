name: Build GlicoCare

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Installa ESATTAMENTE la versione 0.27.1 per evitare conflitti
        pip install flet==0.27.1
        pip install Pillow matplotlib pyinstaller

    - name: Build with PyInstaller (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        pyinstaller --onefile --windowed --name GlicoCare \
          --hidden-import flet_desktop \
          --hidden-import flet \
          --add-data "database/schema.sql:database" \
          --add-data "database/popola_test.sql:database" \
          --add-data "img:img" \
          main.py

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --onefile --windowed --name GlicoCare `
          --hidden-import flet_desktop `
          --hidden-import flet `
          --add-data "database/schema.sql;database" `
          --add-data "database/popola_test.sql;database" `
          --add-data "img;img" `
          main.py

    - name: Upload artifact (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: GlicoCare-Windows
        path: dist/GlicoCare.exe

    - name: Upload artifact (Linux)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: GlicoCare-Linux
        path: dist/GlicoCare